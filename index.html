<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIAP Cloud Collections Service</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HOME -->
  <section id="homeView" class="view active">
    <div class="container">
      <header class="hero">
        <h1>FIAP</h1>
        <p>The International Federation of Photographic Art</p>
      </header>

      <main class="grid">
        <button
          class="card"
          data-title="PFIAP"
          data-url="https://fiapnas.quickconnect.to/d/s/17Mcit12P6iqBfOBLh99WetIhDxhgzNj/KJ3xZYfwgBBQaHG1ltzq9NlA4uSdtDK8-urRAXc_-Bw0">
          <h2>PFIAP</h2>
          <p>FIAP Portfolio</p>
        </button>

        <button
          class="card"
          data-title="MFIAP"
          data-url="https://fiapnas.quickconnect.to/d/s/17Z9eEGu1Ka0PEBG6yRLJdtAqjiGzIoO/40B0qEW8vFrcBGUnErltRAxOVJYyXJXz-D7ygXjC4EQ0">
          <h2>MFIAP</h2>
          <p>Master FIAP</p>
        </button>

        <button
          class="card"
          data-title="FIAP Distinctions"
          data-url="#">
          <h2>FIAP Distinctions</h2>
          <p>NFIAP AFIAP EFIAP</p>
        </button>

        <button
          class="card"
          data-title="FIAP Biennials"
          data-url="https://fiapnas.quickconnect.to/d/s/17ZBobEHIBeALmacqmc10EG4LdFqJ8v5/lqNYD-lFbn_ew3pvsyMHk7YkgXQ_-9Ov-br3AWgu-EQ0">
          <h2>FIAP Biennials</h2>
          <p>Biennials</p>
        </button>

        <button
          class="card"
          data-title="FIAP World Cup"
          data-url="https://fiapnas.quickconnect.to/d/s/17ZBx755GbgCrGob2A0CorJvVhvHvIFg/VHcAxC_4EAg0y9QWSMvbNl5WkAnvgTEU-sbJgVk--EQ0">
          <h2>FIAP World Cup</h2>
          <p>for Clubs</p>
        </button>
      </main>
    </div>
  </section>

  <!-- VIEWER DESKTOP -->
  <section id="viewerView" class="view">
    <div class="viewer-shell">
      <header class="viewer-header">
        <div class="viewer-left">
          <button id="backButton" class="top-btn" type="button">← Back to menu</button>
        </div>

        <h2 id="viewerTitle">Viewer</h2>

        <div class="viewer-right">
          <img src="FIAP_Logo.png" alt="FIAP Logo" class="fiap-logo">
        </div>
      </header>

      <div class="viewer-content">
        <div id="loadingOverlay" class="loading-overlay hidden">
          <div class="spinner"></div>
          <p>Loading archive…</p>
        </div>

        <div id="iframeNotice" class="iframe-notice hidden">
          <div class="notice-box">
            <h3>Embedded view unavailable</h3>
            <p>This archive cannot be displayed inside this page.</p>
            <a
              id="openExternalNotice"
              class="top-btn primary"
              href="#"
              target="_blank"
              rel="noopener noreferrer">
              Open externally
            </a>
          </div>
        </div>

        <iframe id="viewerFrame" title="FIAP Viewer"></iframe>
      </div>
    </div>
  </section>

  <footer class="footer">
    FIAP All right reserved 2026
  </footer>

  <script src="script.js"></script>
</body>
</html>
